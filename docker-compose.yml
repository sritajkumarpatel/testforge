services:
  testforge:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "3010:3010"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    volumes:
      # Persist run logs between container restarts
      - testforge-logs:/app/server/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Optional: local Ollama sidecar for on-prem LLM inference
  # Uncomment if you want to run Ollama alongside TestForge
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama-models:/root/.ollama
  #   restart: unless-stopped

volumes:
  testforge-logs:
  # ollama-models:
